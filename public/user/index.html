<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lume Feedback</title>
    <link rel="stylesheet" href="/vendor/@fontsource/cormorant-garamond/400.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/cormorant-garamond/600.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/cormorant-garamond/400-italic.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/noto-sans-sc/300.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/noto-sans-sc/400.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/noto-sans-sc/500.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/noto-serif-sc/400.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/manrope/400.css" />
    <link rel="stylesheet" href="/vendor/@fontsource/lora/500.css" />
    <link rel="stylesheet" href="/common/theme.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="user-site" data-page="home">
    <div class="ambient-shell">
      <div class="mist-orb orb-a"></div>
      <div class="mist-orb orb-b"></div>
      <div class="mist-orb orb-c"></div>

      <header class="home-header fade-rise">
        <div class="brand-mark">
          <span class="brand-dot"></span>
          <span>LumeForU</span>
        </div>
        <a class="pill nav-pill" href="http://localhost:5012">Admin portal</a>
      </header>

      <main class="home-main">
        <section class="hero-copy">
          <span class="eyebrow fade-rise delay-1">Soft feedback ritual</span>
          <h1 class="hero-display fade-rise delay-2">Your whisper, gently archived.</h1>
          <p class="hero-cn fade-rise delay-3">
            把体验里的小失误与好点子，安静地交给这里。
            <br />
            我们会认真阅读，也会认真改进。
          </p>
          <div class="hero-note fade-rise delay-4">
            视觉方向参考你给的粉紫雾面气质，按钮和版式保持轻盈、安静、精细。
          </div>
        </section>

        <section class="feature-grid">
          <a class="feature-card glass-panel fade-rise delay-2" href="/bug">
            <div class="feature-head">
              <span class="feature-index">01</span>
              <span class="feature-kicker">Bug report</span>
            </div>
            <h2>反馈 Bug</h2>
            <p>支持一次提交多条问题，附带截图、联系信息与管理员优先级入口。</p>
            <span class="feature-action pill">Start tracing</span>
          </a>

          <a class="feature-card glass-panel fade-rise delay-3" href="/suggestions">
            <div class="feature-head">
              <span class="feature-index">02</span>
              <span class="feature-kicker">Product voice</span>
            </div>
            <h2>功能建议 / 其他反馈</h2>
            <p>把你希望出现的体验、优化与灵感提交给产品侧，后续可在管理台沉淀为需求文档。</p>
            <span class="feature-action pill">Open channel</span>
          </a>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
